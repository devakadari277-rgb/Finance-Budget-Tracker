<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Finance Budget Tracker </title>
  <link rel="icon" href="{{ url_for('static', filename='images/title.png') }}" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/background.css') }}">
</head>

<body class="auth-body">
  <div class="bg-layer">
    <div class="bg-image" id="bgImage"></div>
  </div>
  <div class="bg-overlay"></div>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="card-body p-5">
        <h1 class="text-center mb-4"> Finance Budget Tracker</h1>
        <p class="text-center text-muted mb-2">Already registered? Log in to access your dashboard.</p>
        <h5 class="text-center text-muted mb-4">Login</h5>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100 mb-2">Login</button>
          <a href="/register" class="btn btn-outline-secondary w-100">Create Account</a>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/bg-interact.js') }}"></script>
</body>

</html>
