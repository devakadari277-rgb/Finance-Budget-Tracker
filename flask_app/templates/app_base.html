<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Finance Tracker{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='images/title.png') }}" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/background.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/visibility.css') }}">
</head>
<body>
  <div class="bg-layer"><div class="bg-image" id="bgImage"></div></div>
  <div class="bg-overlay"></div>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="/dashboard" class="sidebar-brand">
          <img src="{{ url_for('static', filename='images/dollar_icon.png') }}" alt="Dollar Icon" class="premium-emoji">
          Finance Tracker
        </a>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard" class="sidebar-link {% if request.path == '/dashboard' %}active{% endif %}">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
        <a href="/add" class="sidebar-link {% if request.path == '/add' %}active{% endif %}">
          <i class="bi bi-plus-circle me-2"></i>Add Transaction
        </a>
        <a href="/monthly" class="sidebar-link {% if request.path == '/monthly' %}active{% endif %}">
          <i class="bi bi-calendar3 me-2"></i>Monthly Analysis
        </a>
        <a href="/yearly" class="sidebar-link {% if request.path == '/yearly' %}active{% endif %}">
          <i class="bi bi-calendar2-range me-2"></i>Yearly Analysis
        </a>
        <a href="/graphs" class="sidebar-link {% if request.path == '/graphs' %}active{% endif %}">
          <i class="bi bi-graph-up-arrow me-2"></i>Graph Analysis
        </a>
        <a href="/history" class="sidebar-link {% if request.path == '/history' %}active{% endif %}">
          <i class="bi bi-clock-history me-2"></i>History
        </a>
        <a href="/compare" class="sidebar-link {% if request.path == '/compare' %}active{% endif %}">
          <i class="bi bi-arrow-left-right me-2"></i>Compare
        </a>
        <a href="/reports" class="sidebar-link {% if request.path == '/reports' %}active{% endif %}">
          <i class="bi bi-file-earmark-text me-2"></i>Reports
        </a>
        <a href="/targets" class="sidebar-link {% if request.path == '/targets' %}active{% endif %}">
          <i class="bi bi-bullseye me-2"></i>Targets
        </a>
        <a href="/calculator" class="sidebar-link {% if request.path == '/calculator' %}active{% endif %}">
          <i class="bi bi-calculator me-2"></i>Calculator
        </a>
        <a href="/logout" class="sidebar-link sidebar-logout">
          <i class="bi bi-box-arrow-right me-2"></i>Logout
        </a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="content-wrapper container-fluid py-4">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/bg-interact.js') }}"></script>
  <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
