<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Finance Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/background.css') }}">
</head>

<body class="auth-body">
  <div class="bg-layer">
    <div class="bg-image" id="bgImage"></div>
  </div>
  <div class="bg-overlay"></div>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="card-body p-5">
        <h1 class="text-center mb-4 d-flex align-items-center justify-content-center" style="white-space: nowrap;">
          <img src="{{ url_for('static', filename='images/money_emoji.png') }}" alt="Emoji" class="premium-emoji">
          <span>Finance Tracker</span>
        </h1>
        <!-- <p class="text-center text-muted mb-2">Registration is required to use Finance Intel. Create your account first.</p> -->
        <h5 class="text-center text-muted mb-4"> Registration. </h5>
        <!-- <h5 class="text-center text-muted mb-3"> Create account. </h5> -->

        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="POST" action="/register" id="register-form">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" required placeholder="First name">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name / ID</label>
              <input type="text" name="name" class="form-control" required placeholder="User ID or Name">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required placeholder="your@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" id="pwd" class="form-control" required placeholder="Create password">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_pwd" class="form-control" required
              placeholder="Confirm password">
            <div id="pwd-match" class="text-danger small mt-1" style="display:none">Passwords do not match</div>
          </div>
          <button type="submit" class="btn btn-success w-100 mb-2">Register</button>
          <a href="/login" class="btn btn-outline-secondary w-100">Already have account? Login</a>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/bg-interact.js') }}"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', function (e) {
      var p = document.getElementById('pwd').value;
      var c = document.getElementById('confirm_pwd').value;
      var msg = document.getElementById('pwd-match');

      if (p !== c) {
        e.preventDefault();
        msg.style.display = 'block';
        return false;
      }
      msg.style.display = 'none';
    });
  </script>
</body>

</html>
