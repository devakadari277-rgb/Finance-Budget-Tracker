<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Finance Tracker{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='images/title.png') }}" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <img src="{{ url_for('static', filename='images/dollar_icon.png') }}" alt="Emoji" class="premium-emoji">
        Finance Tracker
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/add">Add Transaction</a></li>
          <li class="nav-item"><a class="nav-link" href="/monthly">Monthly Analysis</a></li>
          <li class="nav-item"><a class="nav-link" href="/yearly">Yearly Analysis</a></li>
          <li class="nav-item"><a class="nav-link" href="/reports">Reports</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="money-fall-container"></div>
  <main class="container-fluid py-4 content-wrapper text-dark">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/moneyfall.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
