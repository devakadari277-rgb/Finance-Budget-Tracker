{% extends "app_base.html" %}
{% block title %}Yearly Analysis{% endblock %}
{% block content %}
<h1 class="mb-4">Yearly Analysis</h1>
<div class="mb-3 d-flex align-items-center gap-2">
  <label class="form-label mb-0 text-visible">Select Year</label>
  <select class="form-select w-auto" id="sel-year"></select>
</div>
<div class="mb-4"></div>
<div class="row g-3 mb-4" id="yearly-stats"></div>
<div class="card chart-dark"><div class="card-body"><canvas id="yearly-chart" height="120"></canvas></div></div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/yearly.js') }}"></script>
{% endblock %}
